{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Título principal -->
        <h1 class="text-center mb-4 text-primary">
            <i class="fas fa-sitemap me-2"></i> Crear Dirección
        </h1>

        <!-- Formulario de creación de direcciones -->
        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}

            <!-- Campo de Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre:</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="nombre" 
                    name="nombre" 
                    placeholder="Ingrese el nombre de la dirección" 
                    required>
            </div>

            <!-- Campo de Descripción -->
            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción:</label>
                <textarea 
                    class="form-control" 
                    id="descripcion" 
                    name="descripcion" 
                    rows="4" 
                    placeholder="Describa brevemente la dirección" 
                    required></textarea>
            </div>

            <!-- Botón de envío -->
            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check-circle me-2"></i> Crear Dirección
                </button>
            </div>
        </form>
    </div>
{% endblock %}
