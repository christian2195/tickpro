{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <h1 class="text-center mb-4 text-primary">
            <i class="fas fa-user-edit me-2"></i> Editar Cliente
        </h1>

        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre:</label>
                <input type="text" class="form-control" id="nombre" name="nombre" value="{{ cliente.nombre }}" required>
            </div>
            <div class="mb-3">
                <label for="apellido" class="form-label">Apellido:</label>
                <input type="text" class="form-control" id="apellido" name="apellido" value="{{ cliente.apellido }}" required>
            </div>
            <div class="mb-3">
                <label for="nombre_usuario" class="form-label">Nombre de usuario:</label>
                <input type="text" class="form-control" id="nombre_usuario" name="nombre_usuario" value="{{ cliente.nombre_usuario }}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico:</label>
                <input type="email" class="form-control" id="email" name="email" {% if cliente.email is None %} placeholder="Correo no especificado" {% else %} value="{{ cliente.email }}" {% endif %}>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Nueva contraseña:</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Escribe la nueva contraseña si la deseas cambiar">
            </div>
            <div class="mb-3">
            <label for="direccion" class="form-label">Dirección:</label>
            <input type="text" class="form-control" id="direccion" name="direccion" value="{{ cliente.direccion }}" required>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check-circle me-2"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
{% endblock %}
