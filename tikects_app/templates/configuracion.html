{% extends 'base.html' %}

{% block content %}
    <div class="container mt-4 animated-section">
        <h1 class="text-center mb-4"><i class="fas fa-cogs me-2"></i> Configuración</h1>
        <div class="row justify-content-center">
            <!-- Primer div -->
            <div class="col-md-4 mb-3">
                <div class="box p-3 shadow-sm border rounded text-center bg-light">
                    <h2 class="mb-3">Clientes</h2>
                    <p>
                        <a href="{% url 'ver_cliente' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-users me-2"></i> Usuarios/clientes
                        </a>
                    </p>
                    <p>
                        <a href="{% url 'usuarios_clientes_grupos' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-users-cog me-2"></i> Grupos
                        </a>
                    </p>
                    <p>
                        <a href="{% url 'ver_direcciones' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-building me-2"></i> Direcciones
                        </a>
                    </p>
                    
                </div>
            </div>

            <!-- Segundo div -->
            <div class="col-md-4 mb-3">
                <div class="box p-3 shadow-sm border rounded text-center bg-light">
                    <h2 class="mb-3">Usuarios</h2>
                    <p>
                        <a href="{% url 'usuarios_agentes' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-user-tie me-2"></i> Agentes
                        </a>
                    </p>
                    <p>
                        <a href="{% url 'usuarios_grupos_agentes' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-layer-group me-2"></i> Grupos
                        </a>
                    </p>
                    
                    <p>
                        <a href="{% url 'ver_agentes_genericos' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-user-secret me-2"></i> Agente genérico
                        </a>
                    </p>
                </div>
            </div>

            <!-- Tercer div -->
            <div class="col-md-4 mb-3">
                <div class="box p-3 shadow-sm border rounded text-center bg-light">
                    <h2 class="mb-3">Tickets</h2>
                    <p>
                        <a href="{% url 'tikects_colas' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-stream me-2"></i> Colas
                        </a>
                    </p>
                    <p>
                        <a href="{% url 'tikects_servicios' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-cogs me-2"></i> Servicios
                        </a>
                    </p>
                    
                    <p>
                        <a href="{% url 'estadisticas' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-chart-bar me-2"></i> Estadísticas
                        </a>
                    </p>
                    <p>
                        <a href="{% url 'registrar_usuarios' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-chart-bar me-2"></i> Registrar clientes
                        </a>
                    </p>
                    <p>
                        <a href="{% url 'registrar_tickets' %}" class="text-decoration-none text-dark">
                            <i class="fas fa-chart-bar me-2"></i> Registrar tikects
                        </a>
                    </p>                  
                </div>
            </div>
        </div>
    </div>
{% endblock %}
