{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <!-- Título principal -->
        <h1 class="text-center mb-4 text-primary">
            <i class="fas fa-user-plus me-2"></i> Crear Cliente
        </h1>

        <!-- Formulario de registro de clientes -->
        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            
            <!-- Campo de Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre:</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>

            <!-- Campo de Apellido -->
            <div class="mb-3">
                <label for="apellido" class="form-label">Apellido:</label>
                <input type="text" class="form-control" id="apellido" name="apellido" required>
            </div>

            <!-- Campo de Nombre de usuario -->
            <div class="mb-3">
                <label for="username" class="form-label">Nombre de usuario:</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>

            <!-- Campo de Correo Electrónico -->
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico:</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="No es obligatorio">
            </div>

            <!-- Campo de Teléfono -->
            <div class="mb-3">
                <label for="telefono" class="form-label">Teléfono:</label>
                <input type="text" class="form-control" id="telefono" name="telefono" placeholder="No es obligatorio">
            </div>

            <!-- Campo de Contraseña -->
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña:</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <!-- Campo de Dirección -->
            div class="mb-3">
                <label for="direccion" class="form-label">Dirección:</label>
                <input type="text" class="form-control" id="direccion" name="direccion" required>
            </div>

            <!-- Botón de envío -->
            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-check-circle me-2"></i> Registrar Cliente
                </button>
            </div>
        </form>
    </div>
{% endblock %}
