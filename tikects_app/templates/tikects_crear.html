{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-4 text-primary">
        <i class="fas fa-ticket-alt me-2"></i> Crear Ticket
    </h1>

    <form method="post" action="{% url 'crear_tikects' %}" class="shadow p-4 rounded bg-light">
        {% csrf_token %}

        <!-- Campo de Servicio -->
        <div class="mb-3">
            <label for="servicio" class="form-label">Seleccionar Servicio:</label>
            <select class="form-select" id="servicio" name="servicio" required>
                <option value="" disabled selected>-- Selecciona un servicio --</option>
                {% for servicio in servicios %}
                    <option value="{{ servicio.id }}">{{ servicio.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Campo de Cola (ahora visible) -->
        <div class="mb-3">
            <label for="cola" class="form-label">Seleccionar Cola:</label>
            <select class="form-select" id="cola" name="cola" required>
                <option value="" disabled selected>-- Selecciona una cola --</option>
                {% for cola in colas %}
                    <option value="{{ cola.id }}">{{ cola.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Campo de Título -->
        <div class="mb-3">
            <label for="titulo" class="form-label">Título:</label>
            <input type="text" class="form-control" id="titulo" name="titulo" required>
        </div>

        <!-- Campo de Descripción -->
        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción:</label>
            <textarea class="form-control" id="descripcion" name="descripcion" rows="4" required></textarea>
        </div>

        <!-- Campo de Gerencia -->
        <div class="mb-3">
            <label for="gerencia" class="form-label">Seleccionar Direccion:</label>
            <select class="form-select" id="gerencia" name="gerencia" required>
                <option value="" disabled selected>-- Selecciona una direccion --</option>
                {% for direccion in direcciones %}
                    <option value="{{ direccion.nombre }}">{{ direccion.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Botón de envío -->
        <div class="text-center">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-check-circle me-2"></i> Crear Tikect
            </button>
        </div>
    </form>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet" />

<script>
    $(document).ready(function () {
        $('#direccion').select2({
            placeholder: "-- Selecciona o escribe una dirección --",
            allowClear: true
        });
    });
</script>
{% endblock %}
